<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | LonAsh Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lonash-blue': '#1E40AF',
                        'lonash-orange': '#F97316',
                    }
                }
            }
        }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module">
        import { 
            auth, db, collection, addDoc, getDocs, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, onAuthStateChanged, signOut 
        } from '../assets/js/firebase-config.js';

        document.addEventListener('alpine:init', () => {
            Alpine.data('adminDashboard', () => ({
                currentTab: 'bookings',
                bookings: [],
                tours: [],
                showTourModal: false,
                newTour: { title: '', category: 'Adventure', price: '' },
                user: null,

                init() {
                    onAuthStateChanged(auth, (user) => {
                        if (!user) {
                            window.location.href = 'login.html';
                        } else {
                            this.user = user;
                            this.setupRealtimeListeners();
                        }
                    });
                },

                setupRealtimeListeners() {
                    // Listen for Bookings
                    const bookingsQuery = query(collection(db, 'bookings'), orderBy('createdAt', 'desc'));
                    onSnapshot(bookingsQuery, (snapshot) => {
                        this.bookings = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                    });

                    // Listen for Tours
                    const toursQuery = query(collection(db, 'tours'), orderBy('createdAt', 'desc'));
                    onSnapshot(toursQuery, (snapshot) => {
                        this.tours = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                    });
                },

                async logout() {
                    try {
                        await signOut(auth);
                        window.location.href = 'login.html';
                    } catch (err) {
                        console.error('Logout failed:', err);
                    }
                },

                async deleteTour(id) {
                    if(confirm('Are you sure you want to delete this tour?')) {
                        try {
                            await deleteDoc(doc(db, 'tours', id));
                        } catch (err) {
                            console.error('Delete failed:', err);
                        }
                    }
                },

                async addTour() {
                    try {
                        await addDoc(collection(db, 'tours'), {
                            ...this.newTour,
                            price: Number(this.newTour.price),
                            createdAt: new Date().toISOString()
                        });
                        this.newTour = { title: '', category: 'Adventure', price: '' };
                        this.showTourModal = false;
                    } catch (err) {
                        console.error('Add tour failed:', err);
                    }
                },

                async updateBookingStatus(id, status) {
                    try {
                        const bookingRef = doc(db, 'bookings', id);
                        await updateDoc(bookingRef, { status: status });
                    } catch (err) {
                        console.error('Update status failed:', err);
                    }
                }
            }));
        });
    </script>
</head>
<body class="bg-gray-50 min-h-screen" x-data="adminDashboard">

    <!-- Sidebar -->
    <aside class="fixed inset-y-0 left-0 w-64 bg-lonash-blue text-white p-6 hidden md:block">
        <div class="flex items-center space-x-2 mb-12">
            <div class="bg-white p-1 rounded-md">
                <svg class="w-6 h-6 text-lonash-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 002 2h1.5a2.5 2.5 0 012.5 2.5V14a2 2 0 002 2h1.065M12 22a10 10 0 100-20 10 10 0 000 20z"></path></svg>
            </div>
            <span class="text-xl font-bold">LonAsh Admin</span>
        </div>

        <nav class="space-y-2">
            <button @click="currentTab = 'bookings'" :class="currentTab === 'bookings' ? 'bg-white/10' : ''" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-white/5 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span>Bookings</span>
            </button>
            <button @click="currentTab = 'tours'" :class="currentTab === 'tours' ? 'bg-white/10' : ''" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-white/5 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-10V4m0 10V4m0 10V4m0 10V4"></path></svg>
                <span>Tours</span>
            </button>
            <button @click="currentTab = 'settings'" :class="currentTab === 'settings' ? 'bg-white/10' : ''" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl hover:bg-white/5 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>Settings</span>
            </button>
        </nav>

        <div class="absolute bottom-8 left-6 right-6">
            <button @click="logout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl bg-white/5 hover:bg-red-500 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="md:ml-64 p-8">
        <!-- Header -->
        <header class="flex items-center justify-between mb-12">
            <div>
                <h1 class="text-3xl font-bold text-gray-900" x-text="currentTab.charAt(0).toUpperCase() + currentTab.slice(1)">Dashboard</h1>
                <p class="text-gray-500">Welcome back, Benjamin Eyison</p>
            </div>
            <div class="flex items-center space-x-4">
                <div class="bg-white p-2 rounded-xl shadow-sm border px-4 flex items-center space-x-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-sm font-medium text-gray-700">Live Server</span>
                </div>
            </div>
        </header>

        <!-- Bookings Tab -->
        <div x-show="currentTab === 'bookings'" x-cloak>
            <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">Booking ID</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">Customer</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">Tour</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">Date</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y">
                        <template x-for="booking in bookings" :key="booking.id">
                            <tr class="hover:bg-gray-50 transition">
                                <td class="px-6 py-4 font-bold text-lonash-blue" x-text="booking.id"></td>
                                <td class="px-6 py-4">
                                    <div class="font-bold" x-text="booking.name"></div>
                                    <div class="text-xs text-gray-500" x-text="booking.email"></div>
                                </td>
                                <td class="px-6 py-4 text-sm" x-text="booking.tour"></td>
                                <td class="px-6 py-4 text-sm" x-text="booking.date"></td>
                                <td class="px-6 py-4">
                                    <span :class="{
                                        'bg-yellow-100 text-yellow-700': booking.status === 'Pending',
                                        'bg-green-100 text-green-700': booking.status === 'Approved',
                                        'bg-red-100 text-red-700': booking.status === 'Cancelled'
                                    }" class="px-3 py-1 rounded-full text-xs font-bold" x-text="booking.status"></span>
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center space-x-2">
                                        <button @click="updateBookingStatus(booking.id, 'Approved')" class="text-green-600 hover:bg-green-50 p-1 rounded transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg></button>
                                        <button @click="updateBookingStatus(booking.id, 'Cancelled')" class="text-red-600 hover:bg-red-50 p-1 rounded transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                                        <a :href="'tel:' + booking.phone" class="text-blue-600 hover:bg-blue-50 p-1 rounded transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg></a>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
                <div x-show="bookings.length === 0" class="p-12 text-center text-gray-500">No booking requests found.</div>
            </div>
        </div>

        <!-- Tours Tab -->
        <div x-show="currentTab === 'tours'" x-cloak>
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Manage Packages</h3>
                <button @click="showTourModal = true" class="bg-lonash-blue text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-900 transition flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Add New Tour
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="tour in tours" :key="tour.id">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border hover:shadow-md transition group">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-blue-50 text-lonash-blue px-3 py-1 rounded-full text-xs font-bold" x-text="tour.category"></span>
                            <button @click="deleteTour(tour.id)" class="text-gray-400 hover:text-red-500 transition opacity-0 group-hover:opacity-100">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                        <h4 class="text-lg font-bold text-gray-900 mb-2" x-text="tour.title"></h4>
                        <div class="text-2xl font-bold text-lonash-orange">GH₵<span x-text="tour.price"></span></div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Settings Tab -->
        <div x-show="currentTab === 'settings'" x-cloak>
            <div class="bg-white rounded-3xl p-8 shadow-sm border max-w-2xl">
                <h3 class="text-xl font-bold mb-6">Business Settings</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Business Name</label>
                        <input type="text" value="LonAsh Tours" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">WhatsApp Number</label>
                        <input type="text" value="+233 0559441922" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Support Email</label>
                        <input type="email" value="lonashcomapanylimited@gmail.com" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none">
                    </div>
                    <button class="bg-lonash-blue text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-900 transition">Save Changes</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Tour Modal -->
    <div x-show="showTourModal" x-cloak class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div @click.away="showTourModal = false" class="bg-white rounded-3xl p-8 w-full max-w-lg shadow-2xl">
            <h3 class="text-2xl font-bold text-lonash-blue mb-6">Create New Package</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Tour Title</label>
                    <input type="text" x-model="newTour.title" placeholder="e.g. Accra City Tour" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                        <select x-model="newTour.category" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none">
                            <option>Adventure</option>
                            <option>Educational</option>
                            <option>Wildlife</option>
                            <option>Nature</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Price (GH₵)</label>
                        <input type="number" x-model="newTour.price" placeholder="100" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none">
                    </div>
                </div>
                <div class="flex gap-4 mt-6">
                    <button @click="showTourModal = false" class="flex-1 px-6 py-3 rounded-xl border border-gray-200 font-bold hover:bg-gray-50 transition">Cancel</button>
                    <button @click="addTour()" class="flex-1 bg-lonash-blue text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-900 transition">Create Tour</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
