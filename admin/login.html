<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LonAsh Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lonash-blue': '#1E40AF',
                        'lonash-orange': '#F97316',
                    }
                }
            }
        }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('loginForm', () => ({
                email: '',
                password: '',
                error: '',
                loading: false,
                init() {
                    try {
                        const session = JSON.parse(localStorage.getItem('lonash_admin_session') || 'null');
                        if (session?.active) window.location.href = 'dashboard.html';
                    } catch (_) {}
                },
                login() {
                    this.loading = true;
                    this.error = '';
                    setTimeout(() => {
                        // Simple local session gate (no Firebase auth)
                        // NOTE: Change this passcode any time by editing this file.
                        const okEmail = (this.email || '').trim().length > 3;
                        const okPass = (this.password || '').trim() === 'lonash-admin';
                        if (!okEmail || !okPass) {
                            this.error = 'Invalid credentials. Use the admin passcode.';
                            this.loading = false;
                            return;
                        }
                        localStorage.setItem('lonash_admin_session', JSON.stringify({
                            active: true,
                            email: this.email.trim(),
                            createdAt: new Date().toISOString()
                        }));
                        window.location.href = 'dashboard.html';
                    }, 500);
                }
            }));
        });
    </script>
</head>
<body class="bg-gradient-to-br from-slate-50 via-gray-100 to-slate-200 flex items-center justify-center min-h-screen">

    <div class="bg-white/90 backdrop-blur p-8 rounded-3xl shadow-xl w-full max-w-md border border-white/60" x-data="loginForm">
        <div class="text-center mb-8">
            <div class="bg-lonash-blue w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002-2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-lonash-blue">Admin Portal</h1>
            <p class="text-gray-500">Secure access for staff only</p>
        </div>

        <form @submit.prevent="login()" class="space-y-6">
            <div x-show="error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium" x-text="error" x-cloak></div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Admin Email</label>
                <input type="email" x-model="email" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none transition" placeholder="admin@lonashtours.com">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" x-model="password" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none transition" placeholder="••••••••">
                <p class="text-xs text-gray-400 mt-2">Default passcode: <span class="font-mono font-semibold">lonash-admin</span> (change this in <span class="font-mono">admin/login.html</span>).</p>
            </div>

            <button type="submit" :disabled="loading" class="w-full bg-lonash-blue text-white py-4 rounded-xl font-bold hover:bg-blue-900 transition shadow-lg disabled:opacity-50">
                <span x-show="!loading">Login to Dashboard</span>
                <span x-show="loading" x-cloak>Signing in...</span>
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="../index.html" class="text-gray-400 hover:text-lonash-blue text-sm">← Back to Website</a>
        </div>
    </div>

</body>
</html>
