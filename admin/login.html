<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LonAsh Tours</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lonash-blue': '#1E40AF',
                        'lonash-orange': '#F97316',
                    }
                }
            }
        }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md" x-data="{ 
        username: '', 
        password: '',
        error: '',
        login() {
            if(this.username === 'admin' && this.password === 'lonash2026') {
                localStorage.setItem('lonash_admin_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                this.error = 'Invalid credentials. Please try again.';
            }
        }
    }">
        <div class="text-center mb-8">
            <div class="bg-lonash-blue w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002-2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-lonash-blue">Admin Portal</h1>
            <p class="text-gray-500">Sign in to manage your tours</p>
        </div>

        <form @submit.prevent="login()" class="space-y-6">
            <div x-show="error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium" x-text="error"></div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                <input type="text" x-model="username" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none transition" placeholder="admin">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" x-model="password" class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-lonash-blue outline-none transition" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-lonash-blue text-white py-4 rounded-xl font-bold hover:bg-blue-900 transition shadow-lg">Login to Dashboard</button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="../index.html" class="text-gray-400 hover:text-lonash-blue text-sm">← Back to Website</a>
        </div>
    </div>

</body>
</html>
